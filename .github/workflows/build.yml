name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 构建 APK
        run: |
          docker pull kivy/buildozer:latest 2>&1 | tail -3
          docker run --rm -v $PWD:/home/user/app \
            kivy/buildozer:latest bash -c '
              cd /home/user/app
              # 跳过 root 警告
              echo "y" | buildozer android debug 2>&1
            ' 2>&1

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: 自动点击器-APK
          path: bin/*.apk
