name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 拉取 kivy/buildozer Docker 镜像并构建
        run: |
          # 用官方 kivy 构建容器打包 APK
          docker run --rm -v $PWD:/home/user/app \
            kivy/buildozer:latest \
            bash -c "cd /home/user/app && yes | buildozer android debug" 2>&1

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: 自动点击器-APK
          path: bin/*.apk
