name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 安装依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3 python3-pip python3-setuptools python3-dev \
            git wget unzip file \
            autoconf automake libtool pkg-config \
            libffi-dev libssl-dev libltdl-dev \
            openjdk-17-jdk-headless ccache

      - name: 安装 p4a 并构建
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip setuptools cython
          pip install python-for-android

          # 修复 NDK r27 + SDL2 兼容问题
          export CFLAGS="-DALooper_pollAll=ALooper_pollOnce -Wno-deprecated-declarations"
          export CXXFLAGS="-DALooper_pollAll=ALooper_pollOnce -Wno-deprecated-declarations"

          p4a apk \
            --private . \
            --package=com.autoclient.app \
            --name="自动点击器" \
            --version=1.0 \
            --bootstrap=sdl2 \
            --requirements=python3,kivy,ntplib,pyautogui \
            --arch=arm64-v8a \
            --permission=INTERNET \
            --permission=ACCESS_NETWORK_STATE \
            --orientation=portrait \
            --debug 2>&1

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: 自动点击器-APK
          path: |
            bin/*.apk
            *.apk