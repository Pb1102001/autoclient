name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 构建 APK（Docker）
        run: |
          docker run --rm -v $PWD:/home/user/app \
            kivy/buildozer:latest \
            bash -c '
              cd /home/user/app
              # 永久去掉 root 检查
              sed -i "s/def check_root/def _disabled_check_root/" /home/user/.venv/lib/python3.12/site-packages/buildozer/__init__.py
              sed -i "s/self.check_root()/# skip root check/" /home/user/.venv/lib/python3.12/site-packages/buildozer/__init__.py
              # 修复 distutils
              pip install setuptools -q
              # 创建必要目录
              mkdir -p bin
              # 构建！
              buildozer android debug 2>&1
              echo "BUILD_EXIT_CODE=$?"
            ' 2>&1

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: 自动点击器-APK
          path: bin/*.apk
