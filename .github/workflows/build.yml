name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 安装依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3 python3-pip python3-setuptools \
            git wget unzip file \
            autoconf automake libtool pkg-config \
            libffi-dev libssl-dev libltdl-dev \
            openjdk-17-jdk-headless ccache
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platforms;android-33" 2>&1 | tail -3

      - name: 构建
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip setuptools cython
          pip install python-for-android

          # NDK r26（兼容 SDL2）
          if [ ! -d "$ANDROID_SDK_ROOT/ndk/26.3.11579264" ]; then
            curl -sL -o /tmp/ndk.zip "https://dl.google.com/android/repository/android-ndk-r26d-linux.zip"
            unzip -q /tmp/ndk.zip -d /tmp/
            mv /tmp/android-ndk-r26d "$ANDROID_SDK_ROOT/ndk/26.3.11579264"
            rm /tmp/ndk.zip
          fi

          p4a apk \
            --private . \
            --package=com.autoclient.app \
            --name="自动点击器" \
            --version=1.0 \
            --bootstrap=sdl2 \
            --requirements=python3,kivy==2.2.1,ntplib,pyautogui \
            --arch=arm64-v8a \
            --permission=INTERNET \
            --permission=ACCESS_NETWORK_STATE \
            --orientation=portrait \
            --debug 2>&1

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: 自动点击器-APK
          path: bin/*.apk