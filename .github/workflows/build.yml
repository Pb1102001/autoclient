name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 安装依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3 python3-pip python3-setuptools \
            git wget unzip file \
            autoconf automake libtool pkg-config \
            libffi-dev libssl-dev libltdl-dev \
            openjdk-17-jdk-headless ccache

      - name: 安装 NDK r26 + SDK 33
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platforms;android-33" 2>&1 | tail -1
          if [ ! -d "$ANDROID_SDK_ROOT/ndk/26.3.11579264" ]; then
            cd /tmp && curl -sL --retry 3 -o ndk.zip \
              "https://dl.google.com/android/repository/android-ndk-r26d-linux.zip"
            unzip -q ndk.zip && mkdir -p "$ANDROID_SDK_ROOT/ndk/"
            mv android-ndk-r26d "$ANDROID_SDK_ROOT/ndk/26.3.11579264" && rm ndk.zip
          fi

      - name: 构建 APK（强制 Python 3.11）
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip setuptools cython
          pip install git+https://github.com/kivy/python-for-android.git@develop

          export ANDROIDNDK="$ANDROID_SDK_ROOT/ndk/26.3.11579264"
          export NDK_CCACHE=ccache
          export ac_cv_func_setgrent=no
          export ac_cv_func_getgrent=no
          export ac_cv_func_endgrent=no

          # 强制使用 Python 3.11（修改 recipe 版本）
          P4A_DIR=$(python3 -c "import pythonforandroid; import os; print(os.path.dirname(pythonforandroid.__file__))")
          RECIPE="$P4A_DIR/recipes/python3/__init__.py"
          # 备份原 recipe
          cp "$RECIPE" "${RECIPE}.bak"
          # 修改为 Python 3.11
          sed -i 's/url = {cpython_base_url}\/3\.14\.2\/Python-3\.14\.2\.tar\.xz/url = {cpython_base_url}\/3.11.11\/Python-3.11.11.tar.xz/' "$RECIPE"
          sed -i 's/version = "3\.14"/version = "3.11"/' "$RECIPE"
          grep "version\|url" "$RECIPE" | head -5

          p4a apk \
            --private . \
            --package=com.autoclient.app \
            --name="自动点击器" \
            --version=1.0 \
            --bootstrap=sdl2 \
            --requirements=python3,kivy==2.2.1,ntplib,pyautogui \
            --arch=arm64-v8a \
            --permission=INTERNET \
            --permission=ACCESS_NETWORK_STATE \
            --orientation=portrait \
            --debug 2>&1

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: 自动点击器-APK
          path: bin/*.apk